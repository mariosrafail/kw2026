services:
  kw_server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: kw_server
    environment:
      KW_GAME_PORT: ${KW_GAME_PORT:-8080}
      KW_NETWORK_TRANSPORT: "enet"
    expose:
      - "8080"
    ports:
      - "8080:8080/udp"
    restart: unless-stopped

  kw_auth_api:
    build:
      context: ./tools/auth_api
    container_name: kw_auth_api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTH_API_HOST: "0.0.0.0"
      AUTH_API_PORT: "8090"
    expose:
      - "8090"
    restart: unless-stopped

  kw_updates_http:
    build:
      context: .
      dockerfile: Dockerfile.updates_http
    container_name: kw_updates_http
    expose:
      - "80"
    restart: unless-stopped

  kw_public_proxy:
    build:
      context: .
      dockerfile: Dockerfile.public_proxy
    container_name: kw_public_proxy
    depends_on:
      - kw_server
      - kw_auth_api
      - kw_updates_http
    ports:
      - "80:80"
    volumes:
      - kw_caddy_data:/data
      - kw_caddy_config:/config
    restart: unless-stopped

volumes:
  kw_caddy_data:
  kw_caddy_config:
