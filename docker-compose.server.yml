services:
  kw_server:
    image: barichello/godot-ci:4.6.1
    container_name: kw_server
    working_dir: /game
    command: >
      bash -lc "apt-get update &&
      apt-get install -y --no-install-recommends libfontconfig1 python3-minimal &&
      rm -rf /var/lib/apt/lists/* &&
      python3 /game/tools/check_rpc_surface.py &&
      if command -v godot4 >/dev/null 2>&1; then godot4 --headless --verbose --path /game res://scenes/lobby.tscn -- --mode=server --port=8080; else godot --headless --verbose --path /game res://scenes/lobby.tscn -- --mode=server --port=8080; fi"
    volumes:
      - ./:/game
    ports:
      - "8080:8080/udp"
    restart: unless-stopped

  kw_auth_api:
    build:
      context: ./tools/auth_api
    container_name: kw_auth_api
    environment:
      # Set this in your shell before running docker compose:
      #   DATABASE_URL="postgresql://..."
      DATABASE_URL: ${DATABASE_URL}
      AUTH_API_HOST: "0.0.0.0"
      AUTH_API_PORT: "8090"
    ports:
      - "8090:8090"
    restart: unless-stopped

  kw_updates_http:
    image: nginx:alpine
    container_name: kw_updates_http
    volumes:
      - ./updates_site:/usr/share/nginx/html:ro
    ports:
      - "8081:80"
    restart: unless-stopped
