services:
  kw_server:
    image: barichello/godot-ci:4.6.1
    container_name: kw_server
    working_dir: /game
    command: >
      bash -lc "apt-get update &&
      apt-get install -y --no-install-recommends libfontconfig1 python3-minimal &&
      rm -rf /var/lib/apt/lists/* &&
      python3 /game/tools/check_rpc_surface.py &&
      if command -v godot4 >/dev/null 2>&1; then godot4 --headless --verbose --path /game res://scenes/server_bootstrap.tscn -- --mode=server --port=8080; else godot --headless --verbose --path /game res://scenes/server_bootstrap.tscn -- --mode=server --port=8080; fi"
    volumes:
      - ./:/game
    environment:
      KW_NETWORK_TRANSPORT: "websocket"
    ports:
      - "0.0.0.0:8080:8080/tcp"
    restart: unless-stopped

  kw_auth_api:
    build:
      context: ./tools/auth_api
    container_name: kw_auth_api
    environment:
      # Set this in your shell before running docker compose:
      #   DATABASE_URL="postgresql://..."
      DATABASE_URL: ${DATABASE_URL}
      AUTH_API_HOST: "0.0.0.0"
      AUTH_API_PORT: "8090"
    expose:
      - "8090"
    restart: unless-stopped

  kw_updates_http:
    image: nginx:alpine
    container_name: kw_updates_http
    depends_on:
      - kw_auth_api
    volumes:
      - ./updates_site:/usr/share/nginx/html:ro
      - ./updates_site/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "0.0.0.0:8081:80"
    restart: unless-stopped

  kw_public_proxy:
    image: caddy:2-alpine
    container_name: kw_public_proxy
    depends_on:
      - kw_server
      - kw_auth_api
      - kw_updates_http
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - kw_caddy_data:/data
      - kw_caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped

volumes:
  kw_caddy_data:
  kw_caddy_config:
